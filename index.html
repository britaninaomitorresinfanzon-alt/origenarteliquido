<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Origen</title>

<style>
/* ===== GENERAL ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* ===== HEADER FIJO ===== */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: auto;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px);
  z-index: 1000;
}

.header-content {
  max-width: 1200px;
  height: 100%;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  color: white;
}

.menu a {
  color: white;
  text-decoration: none;
  margin-right: 20px;
  font-size: 14px;
}

.logo img {
  height: 150px;
  width: auto;
  display: block;
}

/* ===== MAIN ===== */
main {
  margin-top: 70px;
}

/* ===== SLIDER HERO ===== */
.hero {
  position: relative;
  width: 100%;
}

.hero img {
  width: 100%;
  height: auto;
  display: block;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.hero h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

.hero p {
  max-width: 600px;
}

.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 40px;
  color: white;
  cursor: pointer;
  padding: 10px;
  user-select: none;
}

.prev { left: 20px; }
.next { right: 20px; }

/* ===== SECCIÓN PRODUCTOS ===== */
.productos-section {
  padding: 60px 20px;
}

.productos-header {
  max-width: 1200px;
  margin: 0 auto 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.productos-header h2 {
  font-size: 28px;
}

.scroll-btn {
  background: none;
  border: none;
  font-size: 30px;
  cursor: pointer;
}

.productos {
  max-width: 1200px;
  margin: auto;
  display: flex;
  gap: 30px;
  overflow-x: auto;
  scroll-behavior: smooth;
  padding-bottom: 20px;
}

.productos::-webkit-scrollbar {
  display: none;
}

.producto {
  min-width: 250px;
  text-decoration: none;
  color: black;
}

.producto-img {
  width: 100%;
  height: 280px;
  overflow: hidden;
}

.producto-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.producto h4 {
  font-size: 15px;
  margin: 10px 0 5px;
}

/* ===== SECCIONES EXTRA ===== */
.section {
  padding: 80px 20px;
  text-align: center;
}

.section.alt {
  background: #f4f4f4;
}
</style>
</head>

<body>

<header>
  <div class="header-content">
    <nav class="menu">
      <a href="#">Store</a>
      <a href="#">Our Story</a>
      <a href="#">Contact</a>
      <a href="#">Blog</a>
    </nav>

    <div class="logo">
      <img src="imagenes/logo.png" alt="Origen">
    </div>

    <nav class="menu">
      <a href="#">Account</a>
      <a href="#">Search</a>
      <a href="#">Cart</a>
    </nav>
  </div>
</header>

<main>

<section class="hero">
  <img id="slide" src="imagenes/fondo300.jpg">

  <div class="hero-overlay">
    <h1 id="slide-title"></h1>
    <p id="slide-text"></p>
  </div>

  <div class="nav prev" onclick="anterior()">❮</div>
  <div class="nav next" onclick="siguiente()">❯</div>
</section>

<section class="productos-section">
  <div class="productos-header">
    <button class="scroll-btn" onclick="scrollProductos(-1)">❮</button>
    <h2>Nuestros productos</h2>
    <button class="scroll-btn" onclick="scrollProductos(1)">❯</button>
  </div>

  <div class="productos" id="productos">

    <a href="cafe-grano.html" class="producto">
      <div class="producto-img">
        <img src="imagenes/cafegranito.png">
      </div>
      <h4>CAFÉ GRANO</h4>
    </a>

    <a href="cold-brew.html" class="producto">
      <div class="producto-img">
        <img src="imagenes/fondo400.jpg">
      </div>
      <h4>COLD BREW</h4>
    </a>

    <a href="miel-abeja.html" class="producto">
      <div class="producto-img">
        <img src="imagenes/mieldeabeja.png">
      </div>
      <h4>MIEL DE ABEJA</h4>
    </a>

    <a href="licor-cafe.html" class="producto">
      <div class="producto-img">
        <img src="imagenes/fondo400.jpg">
      </div>
      <h4>LICOR DE CAFÉ</h4>
    </a>

    <a href="mucilago-cacao.html" class="producto">
      <div class="producto-img">
        <img src="imagenes/mucilagocacao.jpg">
      </div>
      <h4>MUCILAGO DE CACAO</h4>
    </a>

    <a href="limon-mandarino.html" class="producto">
      <div class="producto-img">
        <img src="imagenes/limonmandarino.png">
      </div>
      <h4>LIMON MANDARINO O CLEOPATRA</h4>
    </a>

  </div>
</section>

<section class="section alt">
  <h2>Nuestra Historia</h2>
  <p>Contenido adicional aquí.</p>
</section>

</main>

<script>
const slides = [
  { img: "imagenes/fondo300.jpg" },
  {
    img: "imagenes/fondo400.jpg",
  
  },
  { img: "imagenes/fondo500.jpg" },
  { img: "imagenes/fondo600.jpg" },
  { img: "imagenes/fondo700.jpg" },
  { img: "imagenes/fondo800.jpg" }
];

let index = 0;

const slideImg = document.getElementById("slide");
const slideTitle = document.getElementById("slide-title");
const slideText = document.getElementById("slide-text");

function mostrarSlide() {
  slideImg.src = slides[index].img;
  slideTitle.textContent = slides[index].title || "";
  slideText.textContent = slides[index].text || "";
}

function siguiente() {
  index = (index + 1) % slides.length;
  mostrarSlide();
}

function anterior() {
  index = (index - 1 + slides.length) % slides.length;
  mostrarSlide();
}

setInterval(siguiente, 6000);

function scrollProductos(dir) {
  const contenedor = document.getElementById("productos");
  contenedor.scrollLeft += dir * contenedor.clientWidth;
}
</script>

</body>
</html>
